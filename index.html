<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação de Ansiedade e Depressão</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #f0f4f8, #e6ecf2);
            color: #333;
        }
        h1 {
            text-align: center;
            color: #4CAF50;
            padding-top: 20px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin: auto;
            padding: 20px;
            background: #fff;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            margin-top: 30px;
            margin-bottom: 30px;
        }
        .form-section {
            display: none;
            padding: 20px;
        }
        .form-section.active {
            display: block;
            transition: opacity 0.4s ease;
        }
        .form-navigation {
            display: flex;
            justify-content: space-between;
            padding: 20px 0;
            position: sticky;
            bottom: 0;
            background: #fff;
            border-top: 1px solid #ddd;
        }
        .form-navigation button {
            background-color: #4CAF50;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s ease;
        }
        .form-navigation button:hover {
            background-color: #45a049;
        }
        .result {
            padding: 20px;
            border-radius: 8px;
            background: #f9f9f9;
            border: 1px solid #ddd;
            margin-top: 20px;
            display: none;
        }
        .result h2 {
            color: #4CAF50;
            font-weight: 500;
        }
        #whatsapp-field {
            padding: 20px;
            background: #f9f9f9;
            border: 1px solid #ddd;
            margin-top: 20px;
            display: none;
            border-radius: 8px;
        }
        button.submit-whatsapp {
            background-color: #25D366;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        button.submit-whatsapp:hover {
            background-color: #1ebe56;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Avaliação de Ansiedade e Depressão</h1>
    <!-- Conteúdo do formulário permanece igual -->
    <!-- Código do script e demais conteúdos do formulário podem permanecer o mesmo -->
</div>

</body>
</html>
